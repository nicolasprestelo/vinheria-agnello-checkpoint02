<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vinharia Agnello | Checkpoint 02</title>
<!--link que o professor pediu-->
    <link rel="stylesheet" href="src/css/style.css">
</head>
<body>
    
    <header>     
        <h1>Vinharia Agnello</h1>
        <p>Sistema de Avaliação de Estoque e Tendência de Vinhos. Gestão inteligente para safras e armazenamento.</p>
        
        <!-- Botão para disparar o JavaScript que seus colegas vão fazer -->
        <button class="btn-iniciar" onclick="iniciarSistema()">Acessar Sistema de Estoque</button>
    </header>

    <main>
        <!-- Vitrine de produtos organizada em cards para o CSS Grid -->
        <div class="wine-card">
            <img src="./src/assets/vinho_tinto.jfif" alt="Vinho Tinto">
            <p>Vinho Tinto</p>
        </div>

        <div class="wine-card">
            <img src="./src/assets/vinho_rosé.jfif" alt="Vinho Rosé">
            <p>Vinho Rosé</p>
        </div>

        <div class="wine-card">
            <img src="./src/assets/vinho_branco.jfif" alt="Vinho Branco">
            <p>Vinho Branco</p>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Vinharia Agnello</p>
    </footer>

    <script src="src/js/script.js"></script>
</body>
</html>
